<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#07101e" />
    <title>PopShot</title>
    <!-- Inline SVG favicon — a glossy brand-red ball, same render as the
         in-game normal ball. Zero extra request; silences the favicon 404. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='35%25' cy='32%25' r='75%25'%3E%3Cstop offset='0' stop-color='%23fff'/%3E%3Cstop offset='.25' stop-color='%23ff4d6d'/%3E%3Cstop offset='1' stop-color='%239d0a32'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='url(%23g)' stroke='%230a1832' stroke-width='2'/%3E%3Cellipse cx='11' cy='10' rx='3.4' ry='2.2' fill='%23fff' opacity='.85' transform='rotate(-24 11 10)'/%3E%3C/svg%3E" />
    <!-- Premium type: Bowlby One for display, Inter (variable) for UI.
         Self-hosted woff2 (public/fonts/, ~70KB total, OFL-licensed) so the
         game makes zero external font requests — CrazyGames expects builds
         to be self-contained, and this also removes a render-critical
         third-party dependency. font-display: swap never blocks first paint. -->
    <link rel="preload" href="fonts/bowlby-one-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/inter-latin-var.woff2" as="font" type="font/woff2" crossorigin>
    <style>
      @font-face {
        font-family: 'Bowlby One';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('fonts/bowlby-one-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400 900;
        font-display: swap;
        src: url('fonts/inter-latin-var.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>
    <!-- CrazyGames SDK v3. Loaded synchronously so window.CrazyGames is
         available before the (deferred) module script runs. The adapter in
         src/systems/platform.ts gracefully no-ops if the script is blocked
         or fails to load. -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  </head>
  <body data-theme="beach" data-state="boot">
    <div id="wrap">
      <!-- #stage wraps the canvas and the HTML UI overlay so they share an
           identical CSS box (16:9 letterboxed). Canvas renders gameplay; the
           overlay renders all menus / HUD / screens on top in real DOM. -->
      <div id="stage">
        <canvas id="game" width="960" height="540"></canvas>
        <div id="ui-root" aria-live="polite"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
